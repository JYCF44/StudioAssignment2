<head>
    <title>Growth</title>

<style>
    .row{
        width:720px;
        margin: 10px auto 10px auto;
    }

    .image-container {
        display: table-cell;
        vertical-align: middle;
        padding:1px;
    }

    .image-container:hover {
        cursor: pointer;
        transition: transform 0.2s ease;
        transform: scale(1.05);
    }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.1/buzz.min.js"></script>
</head>

<body style="background-color: rgb(189, 255, 174);">

<div class="row">
    <div class="image-container">
        <img id="start1" src="FirstIcons/Artboard1.png"
        onclick="this.src = this.src.includes('FirstIcons') ? 'EndIcons/Artboard1.png' : 'FirstIcons/Artboard1.png';"
        width="200" height="200"/>
    </div>

    <div class="image-container">
        <img id="start2" src="FirstIcons/Artboard2.png"

</div>

    </div>

    <div class="image-container">

        onclick="this.src = this.src.includes('FirstIcons') ? 'EndIcons/Artboard5.png' : 'FirstIcons/Artboard5.png';"
        width="200" height="200"/>
    </div>

    <div class="image-container">

<script>
var sound1 = new buzz.sound("Sounds/Artboard1.mp3");
var sound2 = new buzz.sound("Sounds/Artboard2.mp3");
var sound3 = new buzz.sound("Sounds/Artboard3.mp3");
var sound4 = new buzz.sound("Sounds/Artboard4.mp3");
var sound5 = new buzz.sound("Sounds/Artboard5.mp3");
var sound6 = new buzz.sound("Sounds/Artboard6.mp3");
var sound7 = new buzz.sound("Sounds/Artboard7.mp3");
var sound8 = new buzz.sound("Sounds/Artboard8.mp3");
var sound9 = new buzz.sound("Sounds/Artboard9.mp3");

window.onload = function() {
    document.getElementById('start1').addEventListener('click', function () {sound1.play();});
    document.getElementById('start2').addEventListener('click', function () {sound2.play();});

};

</html>
